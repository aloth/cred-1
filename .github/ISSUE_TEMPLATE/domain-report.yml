name: "\U0001F30D Report Missing Domain"
description: Report a domain that should be added to the CRED-1 dataset
labels: ["domain-report", "new-domain"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve the CRED-1 dataset! Please provide as much evidence as possible so we can evaluate the domain quickly.

  - type: input
    id: domain
    attributes:
      label: Domain
      description: The domain to add (e.g., example.com). Do not include https:// or paths.
      placeholder: example.com
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Suggested Category
      description: Which category best describes this domain?
      options:
        - fake
        - unreliable
        - conspiracy
        - mixed
        - satire
        - rumor
        - hate
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country / Language
      description: Primary country and language of the domain (e.g., Germany / German)
      placeholder: Germany / German

  - type: checkboxes
    id: evidence-sources
    attributes:
      label: Evidence Sources
      description: Check all that apply
      options:
        - label: Media Bias/Fact Check (MBFC) listing
        - label: IFCN-certified fact-check flagging
        - label: Press council or regulatory action
        - label: Wikipedia documentation
        - label: Academic research or published study
        - label: Other (describe below)

  - type: textarea
    id: evidence-links
    attributes:
      label: Evidence Links
      description: Links to MBFC pages, fact-checks, Wikipedia articles, press council decisions, or other documentation. One per line.
      placeholder: |
        https://mediabiasfactcheck.com/example/
        https://en.wikipedia.org/wiki/Example_(website)
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: Reasoning
      description: Briefly explain why this domain should be included and why you selected the category above.
      placeholder: Provide specific credibility concerns such as documented misinformation, bias ratings, or regulatory actions.
    validations:
      required: true

  - type: input
    id: parent-domain
    attributes:
      label: Related Domain Already in Dataset
      description: If the English-language or parent domain is already in CRED-1, enter it here.
      placeholder: theepochtimes.com
