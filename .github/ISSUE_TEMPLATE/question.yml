name: ❓ Question
description: Ask about the dataset, methodology, or usage
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dataset contents
        - Scoring methodology
        - Pipeline reproduction
        - Integration / usage
        - Other
